# train.yaml
# Here we define a small model (SmolLM-135M) for fine-tuning so it fits easily on standard hardware.

model:
  model_name: "HuggingFaceTB/SmolLM-135M-Instruct"
  torch_dtype_str: "bfloat16"
  trust_remote_code: true

data:
  train:
    dataset_name: "squad" # We are just using a basic Q&A dataset as an example
    split: "train[:1000]" # Subset for quick training
  
training:
  output_dir: "output/voice_agent_model"
  num_train_epochs: 1
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2e-5
  save_steps: 200
  logging_steps: 10
  
peft:
  q_lora: false
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.1
